<!DOCTYPE html>
<html>

<head>

<title>PantryCloud</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>PantryCloud</h1>


<div id="stats"></div>



<h2>Add Item</h2>


<div class="form">


<button 
id="openableButton"
type="button"
onclick="toggleOpenable()">

    Openable: OFF

</button>


<input id="name" placeholder="Item name">


<input 
id="quantity"
type="number"
placeholder="Quantity"
>


<input 
id="unit"
placeholder="Unit (kg, bottle, etc.)"
>


<input 
id="minimum"
type="number"
placeholder="Minimum quantity"
>



<label>
Category
</label>


<select id="category">

<option value="">
No category
</option>

</select>



<label>
Location
</label>


<select id="location">

<option value="">
No location
</option>

</select>



<button onclick="addItem()">
Add Item
</button>


</div>




<h2>Inventory</h2>



<input
id="searchBox"
placeholder="Search products..."
oninput="searchItems()"
>



<div id="locationTabs"></div>


<div id="categoryTabs"></div>



<div id="items"></div>



<script src="app.js"></script>


</body>

</html>
