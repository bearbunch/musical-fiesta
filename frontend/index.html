<!DOCTYPE html>
<html>
<head>
    <title>PantryCloud</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🏠 PantryCloud</h1>
</header>


<main>

<section class="card">
    <h2>Dashboard</h2>

    <div id="stats">
        Loading...
    </div>
</section>


<section class="card">

<h2>Add Item</h2>

<input id="name" placeholder="Item name">

<input id="quantity" 
       type="number" 
       placeholder="Quantity">


<input id="unit" 
       placeholder="Unit (kg, box, bottle)">


<input id="minimum"
       type="number"
       placeholder="Minimum quantity">


<button onclick="addItem()">
Add Item
</button>

</section>


<section class="card">

<h2>Inventory</h2>

<div id="items">
Loading...
</div>

</section>


</main>


<script src="app.js"></script>

</body>
</html>
