<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PantryCloud</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>PantryCloud</h1>


<div id="stats"></div>


<hr>



<h2>Add Item</h2>


<div class="form">


<button
id="openableButton"
type="button"
onclick="toggleOpenable()">

Openable: OFF

</button>


<br><br>



<label>
Item Name
</label>


<input
id="name"
type="text"
placeholder="Item name">





<div id="normalQuantity">


<label>
Quantity
</label>


<input
id="quantity"
type="number"
value="1"
min="0">


</div>





<div
id="openQuantityFields"
style="display:none;">


<label>
Unopened Quantity
</label>


<input
id="unopenedQuantity"
type="number"
value="1"
min="0">



<label>
Opened Quantity
</label>


<input
id="openedQuantity"
type="number"
value="0"
min="0">


</div>





<label>
Unit
</label>


<input
id="unit"
placeholder="bottle, tin, kg">





<label>
Minimum Quantity
</label>


<input
id="minimum"
type="number"
value="0"
min="0">





<label>
Category
</label>


<select id="category">

<option value="">
No category
</option>

</select>





<label>
Location
</label>


<select id="location">

<option value="">
No location
</option>

</select>





<br>


<button onclick="addItem()">

Add Item

</button>


</div>








<hr>







<!-- EDIT ITEM FORM -->

<hr>

<h2>Edit Item</h2>

<div class="form" id="editBox" style="display:none;">

    <input type="hidden" id="editId">


    <label>
        Item Name
    </label>

    <input
        id="editName"
        type="text">



    <div id="editNormalQuantity">

        <label>
            Quantity
        </label>

        <input
            id="editQuantity"
            type="number"
            min="0">

    </div>




    <div id="editOpenFields" style="display:none;">

        <label>
            Unopened Quantity
        </label>

        <input
            id="editUnopened"
            type="number"
            min="0">


        <label>
            Opened Quantity
        </label>

        <input
            id="editOpened"
            type="number"
            min="0">


    </div>




    <label>
        Openable
    </label>

    <input
        id="editOpenable"
        type="checkbox">





    <label>
        Unit
    </label>

    <input
        id="editUnit"
        type="text">





    <label>
        Minimum Quantity
    </label>

    <input
        id="editMinimum"
        type="number"
        min="0">





    <label>
        Category
    </label>

    <select id="editCategory">

        <option value="">
            No category
        </option>

    </select>






    <label>
        Location
    </label>

    <select id="editLocation">

        <option value="">
            No location
        </option>

    </select>





    <br><br>


    <button onclick="saveEdit()">
        Save Changes
    </button>



    <button onclick="cancelEdit()">
        Cancel
    </button>


</div>








<hr>






<h2>Inventory</h2>





<input
id="searchBox"
type="text"
placeholder="Search products..."
oninput="searchItems()">





<br><br>




<div id="locationTabs"></div>


<br>


<div id="categoryTabs"></div>


<br>


<div id="items"></div>





<script src="app.js"></script>



</body>


</html>
